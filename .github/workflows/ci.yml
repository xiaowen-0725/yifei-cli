name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Cross-compile check (Windows + macOS)
        run: |
          set -euo pipefail
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null .
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null .
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null .
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -o /dev/null .
