name: release

# Tag a version and push it to cut a release:
#   npm version patch        # bumps package.json + creates the git tag vX.Y.Z
#   git push --follow-tags    # or: git push origin main --tags
#
# This workflow then: cross-compiles the 6 platform binaries (version injected
# from the tag), publishes a GitHub Release with them, and publishes the npm
# package. The asset names here MUST match scripts/postinstall.js.
#
# Required repo secret: NPM_TOKEN  (an npmjs.org automation/publish token)
#   gh secret set NPM_TOKEN --repo xiaowen-0725/yifei-cli

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # uses the `go 1.25.x` directive from go.mod

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          LD="-s -w -X github.com/xiaowen-0725/yifei-cli/internal/build.Version=${VERSION} -X github.com/xiaowen-0725/yifei-cli/internal/build.Date=${DATE}"
          mkdir -p dist
          build() { GOOS="$1" GOARCH="$2" CGO_ENABLED=0 go build -ldflags "$LD" -o "dist/$3" . ; }
          build darwin  amd64 yifei-darwin-amd64
          build darwin  arm64 yifei-darwin-arm64
          build windows amd64 yifei-windows-amd64.exe
          build windows arm64 yifei-windows-arm64.exe
          build linux   amd64 yifei-linux-amd64
          build linux   arm64 yifei-linux-arm64
          ( cd dist && sha256sum * > checksums.txt )
          ls -lh dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'   # avoids any local mirror

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Align package.json with the tag so postinstall fetches the matching release.
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public
