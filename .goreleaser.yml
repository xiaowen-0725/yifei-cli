version: 2

builds:
  - binary: yifei
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/xiaowen-0725/yifei-cli/internal/build.Version={{ .Version }} -X github.com/xiaowen-0725/yifei-cli/internal/build.Date={{ .Date }}
    goos: [darwin, windows]
    goarch: [amd64, arm64]

archives:
  - name_template: "yifei-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
